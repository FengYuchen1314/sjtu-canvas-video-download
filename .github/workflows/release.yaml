name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            args: --win nsis
          - os: ubuntu-latest
            platform: linux
            args: --linux deb
          - os: macos-latest
            platform: macos
            args: --mac dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Collect installer artifacts
        shell: bash
        run: |
          mkdir -p dist-assets
          shopt -s nullglob
          for pattern in '*Setup*.exe' '*.deb' '*.dmg'; do
            for file in release/$pattern; do
              cp "$file" dist-assets/
            done
          done
          echo "Collected files:"
          ls -lh dist-assets/
          if [ -z "$(ls -A dist-assets)" ]; then
            echo "No installer artifacts found in release/"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist-assets/
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
